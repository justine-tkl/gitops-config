apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-hybrid-demo
  namespace: openshift-gitops # Or the namespace where your ArgoCD is running
spec:
  project: default
  source:
    repoURL: 'https://github.com/YOUR_USERNAME/gitops-config.git' # <--- CHANGE THIS
    targetRevision: HEAD
    path: . # This tells Argo to look in the root of the repo
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: my-demo-app # The namespace where you want the VM and Pods to live
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true